[tox]
ignore_base_python_conflict = true
requires =
    tox-ansible @ git+https://github.com/cidrblock/tox-ansible.git@molecule-test-type

[ansible]
# Native molecule matrix (tox-ansible@molecule-test-type):
# - molecule-* auto-included when extensions/molecule/ has scenarios
# - integration-* omitted when tests/integration/targets is absent
# shared_state / prerun live in extensions/molecule/config.yml
molecule = auto
molecule_append =
    --workers
    4

---
name: "CI"

concurrency:
  group: ${{ github.head_ref || github.run_id }}-${{ github.event_name }}
  cancel-in-progress: true

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request_target:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sonar:
    name: SonarCloud
    uses: ansible/ansible-content-actions/.github/workflows/sonarcloud.yaml@main
    with:
      python_version: "3.12"
      test_command: "pytest tests/unit -v --cov-report xml --cov=./ -o 'addopts='"
    secrets:
      SONAR_TOKEN: ${{ secrets.ANSIBLE_COLLECTIONS_ORG_SONAR_TOKEN_CICD_BOT }}

  changelog:
    uses: ansible/ansible-content-actions/.github/workflows/changelog.yaml@main
    if: github.event_name == 'pull_request_target'

  ansible-lint:
    uses: ansible/ansible-content-actions/.github/workflows/ansible_lint.yaml@main

  sanity:
    uses: ansible/ansible-content-actions/.github/workflows/sanity.yaml@main

  unit-galaxy:
    uses: ansible/ansible-content-actions/.github/workflows/unit.yaml@main

  # Local integration job: ansible-content-actions integration.yaml forces
  # `--conf tox-ansible.ini`, which ignores pyproject.toml [tool.tox].
  tox-matrix:
    name: Matrix Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # pull_request_target: PR head; push/schedule/workflow_dispatch: github.sha
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install tox-ansible
        run: python -m pip install tox-ansible
      - name: Generate matrix
        id: generate-matrix
        run: python -m tox --ansible --gh-matrix --matrix-scope integration
    outputs:
      envlist: ${{ steps.generate-matrix.outputs.envlist }}

  integration:
    needs: tox-matrix
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.tox-matrix.outputs.envlist) }}
    name: ${{ matrix.entry.name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.entry.python }}
      - name: Install tox-ansible
        run: python -m pip install tox-ansible
      - name: Install build toolchain and openssl headers on Linux
        if: ${{ matrix.entry.python >= 3.12 }}
        shell: bash
        run: sudo apt update && sudo apt install build-essential libssl-dev
      - name: Install libssh headers on Linux for cythonize+coverage
        if: ${{ matrix.entry.python >= 3.12 }}
        shell: bash
        run: sudo apt update && sudo apt install libssh-dev
      - name: Run tox integration tests
        run: python -m tox --ansible -e ${{ matrix.entry.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  report-status:
    if: ${{ always() && github.event_name == 'schedule' }}
    needs:
      - changelog
      - ansible-lint
      - sanity
      - unit-galaxy
      - integration
    uses: ansible/ansible-content-actions/.github/workflows/upload_upstream_results.yaml@main
    with:
      job_context: ${{ toJSON(needs) }}
      component_name: ${{ github.event.repository.name }}
      UPLOAD_USER: ${{ vars.PDE_ORG_RESULTS_AGGREGATOR_UPLOAD_USER }}
      UPLOAD_URL: ${{ vars.PDE_ORG_RESULTS_AGGREGATOR_UPLOAD_URL }}
    secrets:
      UPLOAD_PASSWORD: ${{ secrets.PDE_ORG_RESULTS_UPLOAD_PASSWORD }}

  all_green:
    if: ${{ always() }}
    needs:
      - changelog
      - sanity
      - unit-galaxy
      - ansible-lint
      - integration
      - sonar
      - report-status
    runs-on: ubuntu-latest
    steps:
      - run: >-
          python -c "assert 'failure' not in
          set([
          '${{ needs.changelog.result }}',
          '${{ needs.integration.result }}',
          '${{ needs.sanity.result }}',
          '${{ needs.unit-galaxy.result }}',
          '${{ needs.ansible-lint.result }}',
          '${{ needs.sonar.result }}',
          '${{ needs.report-status.result }}'
          ])"

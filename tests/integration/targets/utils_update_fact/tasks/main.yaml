---
- name: Set a fact
  ansible.builtin.set_fact:
    a:
      b:
        c:
          - 1
          - 2
        d:
          "[bracket_key]": bracket_value
          key: value

- name: Update the fact
  ansible.utils.update_fact:
    updates:
      - path: a.b.c.0
        value: 10
      - path: "a['b']['c'][1]"
        value: 20
      - path: "a['b'][d]['[bracket_key]']"
        value: new_bracket_value
      - path: "a['b'][d]['key']"
        value: new_value
  register: updated

- name: Assert
  ansible.builtin.assert:
    that: "{{ updated.a == expected.a }}"
  vars:
    expected:
      a:
        b:
          c:
            - 10
            - 20
          d:
            "[bracket_key]": new_bracket_value
            key: new_value

- name: Update the fact
  ansible.utils.update_fact:
    updates:
      - path: a
        value:
          x:
            y:
              z:
                - 100
                - true
  register: updated

- name: Assert
  ansible.builtin.assert:
    that: "{{ updated.a == expected.a }}"
  vars:
    expected:
      a:
        x:
          y:
            z:
              - 100
              - true

- name: Update the fact
  ansible.utils.update_fact:
    updates:
      - path: "a.b.c[{{ index }}]"
        value: 20
  vars:
    index: "{{ a.b.c | ansible.utils.index_of('eq', 2) }}"
  register: updated

- name: Assert
  ansible.builtin.assert:
    that: "{{ updated.a == expected.a }}"
  vars:
    expected:
      a:
        b:
          c:
            - 1
            - 20
          d:
            "[bracket_key]": bracket_value
            key: value

- name: Set a fact with multiple bracket variations
  ansible.builtin.set_fact:
    bracket_edge_cases:
      "[[double]]": old1
      "]]right]]": old2
      "[prefix": old3
      "suffix]": old4
      "{curlies}": old5
      "[parent]":
        - regular:
            "[bracket]": old6

- name: Update fact
  ansible.utils.update_fact:
    updates:
      - path: "bracket_edge_cases['[[double]]']"
        value: new1
      - path: "bracket_edge_cases[']]right]]']"
        value: new2
      - path: "bracket_edge_cases['[prefix']"
        value: new3
      - path: "bracket_edge_cases['suffix]']"
        value: new4
      - path: "bracket_edge_cases['{curlies}']"
        value: new5
      - path: "bracket_edge_cases['[parent]'][0]['regular']['[bracket]']"
        value: new6
  register: updated

- name: Assert bracket edge cases
  ansible.builtin.assert:
    that: "{{ updated.bracket_edge_cases == expected.bracket_edge_cases }}"
  vars:
    expected:
      bracket_edge_cases:
        "[[double]]": new1
        "]]right]]": new2
        "[prefix": new3
        "suffix]": new4
        "{curlies}": new5
        "[parent]":
          - regular:
              "[bracket]": new6
